name: SecurePipeline Security Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write  # CodeQL uploads SARIF to Security tab; Gitleaks saves artifact only

jobs:
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # needed if you add SARIF upload later

    steps:
      - name: Checkout — full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # CRITICAL: 0 = full history, not just HEAD
                                # Without this, secrets in old commits are invisible

      - name: Run Gitleaks — current commit
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
          args: >
            detect
            --source=.
            --config=.gitleaks.toml
            --redact
            --verbose
            --exit-code=1

      - name: Run Gitleaks — git history scan
        run: |
          gitleaks detect \
            --source=. \
            --config=.gitleaks.toml \
            --log-opts="--all --full-history" \
            --redact \
            --verbose \
            --exit-code=1

  pip-audit:
    name: pip-audit — Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # needed if you later push SARIF

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit and CycloneDX tooling
        run: |
          pip install --upgrade pip
          pip install pip-audit cyclonedx-bom

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt

      # --- SBOM Generation (SA-12) ---
      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py environment \
            --output-format json \
            --output-file sbom.cdx.json
        # cyclonedx-py scans the current pip environment after install

      - name: Upload SBOM as pipeline artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
        # 90-day retention = audit trail; aligns with AU-11 audit record retention

      # --- Vulnerability Gate (SA-15) ---
      - name: Run pip-audit — fail on HIGH/CRITICAL
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-results.json \
            --skip-editable \
            || AUDIT_EXIT=$?

          # Parse and report findings
          python3 - <<'EOF'
          import json, sys

          with open("pip-audit-results.json") as f:
              data = json.load(f)

          dependencies = data.get("dependencies", [])
          vulns = []

          for dep in dependencies:
              for v in dep.get("vulns", []):
                  vulns.append({
                      "package": dep["name"],
                      "version": dep["version"],
                      "id": v["id"],
                      "aliases": v.get("aliases", []),
                      "description": v.get("description", "")[:120],
                  })

          if not vulns:
              print("✅ pip-audit: No known vulnerabilities found.")
              sys.exit(0)

          print(f"⚠️  pip-audit: {len(vulns)} vulnerability/vulnerabilities found:\n")
          for v in vulns:
              aliases = ", ".join(v["aliases"]) if v["aliases"] else "no CVE alias"
              print(f"  [{v['id']}] {v['package']}=={v['version']}")
              print(f"    Aliases : {aliases}")
              print(f"    Summary : {v['description']}")
              print()

          # Hard fail — any finding blocks the pipeline
          # Rationale: pip-audit reports confirmed vulns only (no severity field
          # in OSV schema); every finding here is a known exploitable issue.
          # For DoD/FedRAMP: no unmitigated known vulns in production supply chain.
          print("❌ Pipeline blocked: known vulnerabilities must be remediated or explicitly waived.")
          sys.exit(1)
          EOF

      - name: Upload pip-audit results
        if: always()   # upload even on failure — preserves evidence
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 90

  codeql-sast:
    name: SAST — CodeQL Python Analysis
    runs-on: ubuntu-latest
    needs: secrets-scan   # Gate: don't run SAST if secrets are present

    permissions:
      contents: read
      security-events: write  # Scoped here too for clarity — CodeQL uploads SARIF

    strategy:
      fail-fast: false        # If you add more languages later, don't cancel all on one failure
      matrix:
        language: [ python ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # queries: security-extended  # Uncomment Phase 4 when you want deeper coverage
          #                             # Default = security-and-quality, good for now

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        # For Python, autobuild just indexes the source — no compile step needed.
        # For compiled languages (Java, Go) this actually builds the binary.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          output: ${{ runner.temp }}/codeql-sarif
          upload: true

      - name: Upload CodeQL SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-python-sarif
          path: ${{ runner.temp }}/codeql-sarif
          if-no-files-found: ignore
          retention-days: 90

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config p/python \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            --severity ERROR \
            --severity WARNING \
            .

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep