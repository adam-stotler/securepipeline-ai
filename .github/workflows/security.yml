name: SecurePipeline Security Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Workflow-level default: least privilege (AC-6)
# security-events: write is NOT granted here — only the jobs that actually
# upload SARIF declare it. Jobs that never write to the Security tab
# (secrets-scan, pip-audit) get contents: read only.
permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read   # read-only — no SARIF upload from this job

    steps:
      - name: Checkout — full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks — current commit
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
          args: >
            detect
            --source=.
            --config=.gitleaks.toml
            --redact
            --verbose
            --exit-code=1

      - name: Run Gitleaks — git history scan
        run: |
          gitleaks detect \
            --source=. \
            --config=.gitleaks.toml \
            --log-opts="--all --full-history" \
            --redact \
            --verbose \
            --exit-code=1

  pip-audit:
    name: pip-audit — Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read   # read-only — no SARIF upload from this job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit and CycloneDX tooling
        run: |
          pip install --upgrade pip
          pip install pip-audit cyclonedx-bom

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py environment \
            --output-format json \
            --output-file sbom.cdx.json

      - name: Upload SBOM as pipeline artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

      - name: Run pip-audit — fail on any known vuln
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-results.json \
            --skip-editable \
            || AUDIT_EXIT=$?

          python3 - <<'EOF'
          import json, sys

          with open("pip-audit-results.json") as f:
              data = json.load(f)

          dependencies = data.get("dependencies", [])
          vulns = []

          for dep in dependencies:
              for v in dep.get("vulns", []):
                  vulns.append({
                      "package": dep["name"],
                      "version": dep["version"],
                      "id": v["id"],
                      "aliases": v.get("aliases", []),
                      "description": v.get("description", "")[:120],
                  })

          if not vulns:
              print("✅ pip-audit: No known vulnerabilities found.")
              sys.exit(0)

          print(f"⚠️  pip-audit: {len(vulns)} vulnerability/vulnerabilities found:\n")
          for v in vulns:
              aliases = ", ".join(v["aliases"]) if v["aliases"] else "no CVE alias"
              print(f"  [{v['id']}] {v['package']}=={v['version']}")
              print(f"    Aliases : {aliases}")
              print(f"    Summary : {v['description']}")
              print()

          print("❌ Pipeline blocked: known vulnerabilities must be remediated or explicitly waived.")
          sys.exit(1)
          EOF

      - name: Upload pip-audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 90

  codeql-sast:
    name: SAST — CodeQL Python Analysis
    runs-on: ubuntu-latest
    needs: secrets-scan
    permissions:
      contents: read
      security-events: write   # Required: CodeQL uploads SARIF to Security tab

    strategy:
      fail-fast: false
      matrix:
        language: [ python ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          output: ${{ runner.temp }}/codeql-sarif
          upload: true

      - name: Upload CodeQL SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-python-sarif
          path: ${{ runner.temp }}/codeql-sarif
          if-no-files-found: ignore
          retention-days: 90

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # Required: uploads SARIF to Security tab
      actions: read
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config p/python \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            --severity ERROR \
            --severity WARNING \
            .

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  trivy-scan:
    name: Trivy — Filesystem Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [ secrets-scan, pip-audit ]   # Don't scan if secrets exposed or deps are vulnerable
    permissions:
      contents: read
      security-events: write   # Required: uploads SARIF to Security tab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy — filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH   # Hard-fail threshold — mirrors DoD IA control gates
          exit-code: 1              # Block pipeline on any CRITICAL or HIGH finding
          ignore-unfixed: true      # Only flag vulns with available fixes — reduces noise
          # ignore-unfixed rationale: unfixed vulns have no remediation path;
          # flagging them blocks the pipeline with no actionable next step.
          # Auditors accept this as a documented risk acceptance posture.

      - name: Run Trivy — secrets scan (filesystem mode)
        uses: aquasecurity/trivy-action@master
        if: always()   # Run even if vuln scan failed — independent gate
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: sarif
          output: trivy-secrets.sarif
          exit-code: 1

      - name: Upload Trivy vuln SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Upload Trivy secrets SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Upload Trivy results as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: |
            trivy-fs.sarif
            trivy-secrets.sarif
          retention-days: 90

  security-summary:
    name: Security Gate Summary
    runs-on: ubuntu-latest
    needs: [ secrets-scan, pip-audit, codeql-sast, semgrep, trivy-scan ]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Write security gate summary
        env:
          SECRETS_RESULT:  ${{ needs.secrets-scan.result }}
          PIPAUDIT_RESULT: ${{ needs.pip-audit.result }}
          CODEQL_RESULT:   ${{ needs.codeql-sast.result }}
          SEMGREP_RESULT:  ${{ needs.semgrep.result }}
          TRIVY_RESULT:    ${{ needs.trivy-scan.result }}
          GH_RUN_NUMBER:   ${{ github.run_number }}
          GH_SHA:          ${{ github.sha }}
          GH_REF_NAME:     ${{ github.ref_name }}
          GH_ACTOR:        ${{ github.actor }}
        run: |
          # Map result string to emoji + label
          status() {
            case "$1" in
              success)  echo "✅ Pass" ;;
              failure)  echo "❌ Fail" ;;
              skipped)  echo "⏭️ Skipped" ;;
              *)        echo "⚠️ Unknown" ;;
            esac
          }

          if [[ "$SECRETS_RESULT" == "success" && \
                "$PIPAUDIT_RESULT" == "success" && \
                "$CODEQL_RESULT" == "success" && \
                "$SEMGREP_RESULT" == "success" && \
                "$TRIVY_RESULT" == "success" ]]; then
            OVERALL="✅ All gates passed — merge authorized"
          else
            OVERALL="❌ One or more gates failed — merge blocked"
          fi

          {
            echo "## SecurePipeline.ai — Security Gate Report"
            echo ""
            echo "**Run:** \`$GH_RUN_NUMBER\`"
            echo "**Commit:** \`$GH_SHA\`"
            echo "**Branch:** \`$GH_REF_NAME\`"
            echo "**Triggered by:** \`$GH_ACTOR\`"
            echo "**Timestamp:** \`$(date -u +"%Y-%m-%dT%H:%M:%SZ")\`"
            echo ""
            echo "---"
            echo ""
            echo "### Gate Results"
            echo ""
            echo "| Gate | Tool | NIST Control | Result |"
            echo "|------|------|-------------|--------|"
            echo "| Secrets detection | Gitleaks | IA-5, SI-12 | $(status $SECRETS_RESULT) |"
            echo "| Dependency vulnerabilities | pip-audit | SA-12, SI-2 | $(status $PIPAUDIT_RESULT) |"
            echo "| SAST — dataflow analysis | CodeQL | SA-11(1) | $(status $CODEQL_RESULT) |"
            echo "| SAST — pattern matching | Semgrep | SA-11(4) | $(status $SEMGREP_RESULT) |"
            echo "| Filesystem + secrets scan | Trivy | RA-5, SI-3 | $(status $TRIVY_RESULT) |"
            echo ""
            echo "---"
            echo ""
            echo "### Overall Posture"
            echo ""
            echo "**$OVERALL**"
            echo ""
            echo "> Pipeline enforces NIST 800-53 controls: IA-5, SI-2, SI-3, SI-12, SA-11(1), SA-11(4), SA-12, RA-5, AC-6, CM-3"
          } >> $GITHUB_STEP_SUMMARY

        - name: Fail job if any gate failed
          if: |
            needs.secrets-scan.result != 'success' ||
            needs.pip-audit.result != 'success' ||
            needs.codeql-sast.result != 'success' ||
            needs.semgrep.result != 'success' ||
            needs.trivy-scan.result != 'success'
          run: |
            echo "One or more security gates failed. See summary above."
            exit 1
