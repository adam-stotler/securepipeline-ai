name: SecurePipeline Security Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read        # Least privilege — only read the repo
  security-events: write # Required to upload SARIF to GitHub Security tab

jobs:
  secrets-scan:
    name: Secrets Detection (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history — scan every commit, not just HEAD

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Only needed for org repos; fine to omit for public/personal

      - name: Upload Gitleaks SARIF report
        if: always()   # Upload even on failure so you can review findings
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 90  # DoD evidence retention — keep artifacts

  dependency-audit:
    name: Dependency Vulnerability Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: secrets-scan   # Don't audit deps if secrets check fails

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Create baseline requirements (Day 1 scaffold)
        run: |
          # We'll replace this with a real requirements.txt as we build
          cat > requirements.txt << 'REQS'
          fastapi==0.111.0
          anthropic==0.28.0
          langchain==0.2.0
          uvicorn==0.30.0
          REQS

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt \
            --format json \
            --output reports/pip-audit-report.json \
            || true   # Don't fail pipeline on Day 1 — we'll tighten this later

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: reports/pip-audit-report.json
          if-no-files-found: ignore
          retention-days: 90
