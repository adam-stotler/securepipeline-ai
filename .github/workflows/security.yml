name: SecurePipeline Security Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write  # Required for both Gitleaks SARIF and CodeQL uploads

jobs:
  secrets-scan:
    name: Secrets Detection (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Upload Gitleaks SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 90

  dependency-audit:
    name: Dependency Vulnerability Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt \
            --format json \
            --output reports/pip-audit-report.json \
            || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: reports/pip-audit-report.json
          if-no-files-found: ignore
          retention-days: 90

  codeql-sast:
    name: SAST — CodeQL Python Analysis
    runs-on: ubuntu-latest
    needs: secrets-scan   # Gate: don't run SAST if secrets are present

    permissions:
      contents: read
      security-events: write  # Scoped here too for clarity — CodeQL uploads SARIF

    strategy:
      fail-fast: false        # If you add more languages later, don't cancel all on one failure
      matrix:
        language: [ python ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # queries: security-extended  # Uncomment Phase 4 when you want deeper coverage
          #                             # Default = security-and-quality, good for now

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        # For Python, autobuild just indexes the source — no compile step needed.
        # For compiled languages (Java, Go) this actually builds the binary.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # SARIF output goes to GitHub Security tab automatically.
          # Also retain as artifact for ATO evidence (90-day DoD pattern).
          upload: true

      - name: Upload CodeQL SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-python-sarif
          path: /home/runner/work/_temp/codeql_databases
          if-no-files-found: ignore
          retention-days: 90